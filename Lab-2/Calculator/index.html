<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="calculator">
        <div class="window">
            <p>
                <span>Here is a div inside div</span>
                <br />
                <br />
                <span>Here is a div inside div</span>
            </p>
        </div>
        <div class="buttons">
            <button> ^ </button>
            <button> / </button>
            <button> * </button>
            <button> - </button>
            <button> 7 </button>
            <button> 8 </button>
            <button> 9 </button>
            <button class="extended-vertical"> + </button>
            <button> 4 </button>
            <button> 5 </button>
            <button> 6 </button>
            <button> 1 </button>
            <button> 2 </button>
            <button> 3 </button>
            <button style="background-color: tomato; color: black; font-weight: 700; border-radius: 15%;"
                class="extended-vertical"> =
            </button>
            <button class="extended-horizontal"> 0 </button>
            <button> . </button>
        </div>
    </div>
</body>

</html>
