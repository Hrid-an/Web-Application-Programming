<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Analyzer</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="analyzer">

        <div class="form_section">
            <h2 class="form_title">Student Grade Analyzer</h2>

            <div class="input_group">
                <label for="student_name">Student Name</label>
                <input type="text" id="student_name" placeholder="e.g. Hridan Bhattarai" />
            </div>

            <div class="input_group">
                <label for="num_subjects">Number of Subjects</label>
                <input type="number" id="num_subjects" min="1" max="6" placeholder="e.g. 5" />
                <button onclick="generate_subject_inputs()" class="generate_button">Generate</button>
            </div>

            <div id="subject_inputs"></div>

            <div class="form_actions">
                <button onclick="add_student()" class="add_button">Add Student</button>
                <button onclick="clear_table()" class="clear_button">Clear All</button>
            </div>

            <div id="error_msg" class="error_msg"></div>
        </div>

        <div class="table_section">
            <table id="result_table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Total</th>
                        <th>Percentage</th>
                        <th>Grade</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="table_body">
                    <tr id="empty_row">
                        <td colspan="7" class="empty_msg">No students added yet.</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</body>

</html>
