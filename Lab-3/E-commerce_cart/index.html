<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="app">

        <div class="app_header">
            <h1 class="app_title">🛍️ Shop</h1>
            <div class="cart_badge">
                Cart: <span id="cart_item_count">0</span> items
            </div>
        </div>

        <div class="main_layout">

            <!-- Product Listing -->
            <div class="section">
                <h2 class="section_title">Products</h2>
                <div id="product_list" class="product_list"></div>
            </div>

            <!-- Cart -->
            <div class="section">
                <h2 class="section_title">Your Cart</h2>
                <div id="cart_list" class="cart_list">
                    <p id="empty_cart_msg" class="empty_msg">Your cart is empty.</p>
                </div>

                <div id="cart_summary" class="cart_summary hidden">
                    <div class="summary_row">
                        <span>Subtotal</span>
                        <span id="subtotal">$0.00</span>
                    </div>
                    <div class="summary_row">
                        <span>Tax (13%)</span>
                        <span id="tax_amount">$0.00</span>
                    </div>
                    <div class="summary_row total_row">
                        <span>Total</span>
                        <span id="grand_total">$0.00</span>
                    </div>
                    <button onclick="clear_cart()" class="clear_button">Clear Cart</button>
                </div>
            </div>

        </div>
    </div>
</body>

</html>
