{% extends 'core/base.html' %}

{% block content %}
<h2>Teachers</h2>
<a href="/teachers/create/" class="btn btn-primary">Add Teacher</a>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Subject</th>
            <th>Phone</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for teacher in teachers %}
        <tr>
            <td>{{ teacher.name }}</td>
            <td>{{ teacher.email }}</td>
            <td>{{ teacher.subject }}</td>
            <td>{{ teacher.phone }}</td>
            <td>
                <a href="/teachers/edit/{{ teacher.id }}/" class="btn btn-warning">Edit</a>
                <a href="/teachers/delete/{{ teacher.id }}/" class="btn btn-danger"
                    onclick="return confirm('Are you sure?')">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5">No teachers found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
